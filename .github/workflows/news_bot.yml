name: Iran News Bot

on:
  schedule:
    # Runs every day at 07:00 UTC (10:30 AM Tehran / 11:00 PM Vancouver)
    - cron: "0 7 * * *"
    # Also runs at 14:00 UTC for an afternoon update
    - cron: "0 14 * * *"
  # Lets you click "Run workflow" manually in GitHub Actions tab
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Check out code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run the news bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:        ${{ secrets.CHAT_ID }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: python main.py
